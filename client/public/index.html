<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <!-- interactive-widget=resizes-content: tells modern mobile browsers to shrink
       the layout (not the viewport) when the keyboard appears, keeping the input
       bar anchored. maximum-scale=1 prevents iOS Safari auto-zoom on input focus
       which pushes the input field out of view.                                 -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#050505" />
  <meta name="description"
        content="GhostLink — End-to-End Encrypted Private Messaging. Zero logs, zero traces." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GhostLink" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- Orbitron: futuristic neon wordmark | Outfit: headings | Inter: body -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet" />

  <title>GhostLink — Encrypted Chat</title>
  <!-- Bootstrap script: runs synchronously before React paints.
       1. Sets data-theme so CSS picks the right colours from frame 0.
       2. Sets --vvh from the Visual Viewport API (falls back to window.innerHeight)
          so the app never flashes the wrong height before JS hydrates.
       Both the theme and Instagram/Safari in-app browser keyboard patches
       depend on these two lines firing as early as possible.               -->
  <script>
    (function () {
      /* Theme */
      var saved = localStorage.getItem('chat-theme');
      document.documentElement.setAttribute('data-theme', saved || 'light');

      /* Visual viewport height — keyboard-aware, Instagram/Safari safe */
      var h = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
      document.documentElement.style.setProperty('--vvh', h + 'px');
    })();
  </script>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>

</html>
